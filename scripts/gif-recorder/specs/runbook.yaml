# ============================================================
# Runbook Feature Demo — GIF Recorder Spec
# ============================================================
#
# This spec records a complete walkthrough of the Runbook feature,
# demonstrating all interactions in block order (top → down):
#
#   1. Open the LogMagnifier panel and expand the Runbook section
#   2. Open the "health-check" runbook in the Webview
#   3. block_0 (Disk Usage)     — Play and watch real-time output
#   4. block_1 (Network Ping)   — Play a long-running command, Stop it, Clear output
#   5. block_2 (Net Interfaces) — Edit the script inline, Save, then Play to verify
#
# Scroll direction is always downward — no jumping back to the top.
#
# Timing fields:
#   delay  — milliseconds to wait after an action for the UI to settle,
#             before capturing the frame. Keep small; use `- type: delay`
#             for intentional pauses between steps.
#   hold   — milliseconds to display this frame in the GIF (duplicates the frame).
#             Omit to show for exactly one frameDelay period.
#
# Run:
#   cd scripts/gif-recorder
#   npm install
#   npm run record:runbook
#
# Output: resources/demo/runbook.gif
# ============================================================

defaults: shared/common.yaml

name: Runbook Feature Demo
output: runbook

steps:
  # ----------------------------------------------------------
  # SETUP (capture: false) — prepare the UI before recording
  # ----------------------------------------------------------

  - type: include
    file: shared/open-logmagnifier.yaml

  - type: setup-sidebar
    collapsed: [Quick Access, Workflows, Word Filters, Regex Filters, ADB Devices, Runbook]
    capture: false

  - type: delay
    ms: 600

  # ----------------------------------------------------------
  # 0. Expand Runbook section, then show initial state
  # ----------------------------------------------------------
  - type: ensure-expanded
    selector: "role=button[name='Runbook Section']"
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "LogMagnifier — Runbook feature"
    hold: 2500

  # ----------------------------------------------------------
  # 2. Expand the "System Check" group
  # ----------------------------------------------------------
  - type: aria-click
    role: treeitem
    name: System Check
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Expand 'System Check' runbook group"
    hold: 1200

  # ----------------------------------------------------------
  # 3. Open the "health-check" runbook
  # ----------------------------------------------------------
  - type: aria-click
    role: treeitem
    name: health-check
    capture: false

  - type: delay
    ms: 1800

  # ----------------------------------------------------------
  # 4. Webview renders
  # ----------------------------------------------------------
  - type: screenshot
    caption: "Runbook rendered as interactive Markdown notebook"
    hold: 3000

  # ----------------------------------------------------------
  # block_0 — Disk Usage: Play → output
  # ----------------------------------------------------------
  - type: webview-click
    selector: "button.play-btn[data-block-id='block_0']"
    caption: "▶ Play — executes shell block in real-time"

  - type: delay
    ms: 1500

  - type: screenshot
    caption: "Real-time command output streamed from shell"
    hold: 3000

  # ----------------------------------------------------------
  # block_1 — Network Ping: scroll → Play → Stop → Clear
  # ----------------------------------------------------------
  - type: webview-scroll
    deltaY: 350
    steps: 6

  - type: delay
    ms: 600

  - type: webview-click
    selector: "button.play-btn[data-block-id='block_1']"
    caption: "▶ Start a long-running command"

  - type: delay
    ms: 600

  - type: screenshot
    caption: "Command running — Stop button replaces Play"
    hold: 2000

  - type: webview-click
    selector: "button.stop-btn[data-block-id='block_1']"
    caption: "■ Stop the running command"

  - type: delay
    ms: 1000

  - type: screenshot
    caption: "Command stopped — process killed cleanly"
    hold: 1500

  - type: webview-click
    selector: "button.clear-btn[data-block-id='block_1']"
    caption: "✕ Clear completed output"

  - type: delay
    ms: 600

  - type: screenshot
    caption: "Output cleared — ready for next run"
    hold: 2000

  # ----------------------------------------------------------
  # block_2 — Network Interfaces: scroll → Edit → type → Save → Play
  # ----------------------------------------------------------
  - type: webview-scroll
    deltaY: 350
    steps: 6

  - type: delay
    ms: 600

  - type: webview-click
    selector: "button.edit-btn[data-block-id='block_2']"
    caption: "✎ Edit — modify the shell script inline"

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Inline editor — textarea replaces code display"
    hold: 2000

  - type: webview-click
    selector: "textarea#editor_block_2"
    capture: false

  - type: delay
    ms: 300

  - type: key
    key: "Meta+a"
    capture: false

  - type: type
    text: "# Network interfaces\nifconfig | grep -E 'inet |flags'\n"
    caption: "Typing new shell command"
    captureEvery: 8

  - type: delay
    ms: 800

  - type: screenshot
    caption: "New command ready to save"
    hold: 2000

  - type: webview-click
    selector: "button.save-btn[data-block-id='block_2']"
    caption: "Save — script persisted to Markdown file"

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Script saved"
    hold: 1500

  - type: webview-click
    selector: "button.play-btn[data-block-id='block_2']"
    caption: "▶ Play — run the newly saved command"

  - type: delay
    ms: 1500

  # ----------------------------------------------------------
  # Final frame — saved command output
  # ----------------------------------------------------------
  - type: screenshot
    caption: "Saved command executed successfully"
    hold: 3000
