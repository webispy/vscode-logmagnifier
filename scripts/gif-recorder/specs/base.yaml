# ============================================================
# Base Demo — GIF Recorder Spec
# ============================================================
#
# This is the primary demo GIF shown at the top of README.md.
# It records a complete walkthrough of the core Word Filters workflow,
# covering the most fundamental features end-to-end:
#
#   1. Open test_log_android.log in the editor
#   2. Expand the Word Filters section in the LogMagnifier sidebar
#   3. Create a group "Android Activity"
#   4. Add three keyword filters: Choreographer, CameraManagerGlobal, AdFit
#   5. Enable the group — highlights appear instantly in the editor
#   6. Cycle highlight modes across the three filters:
#        Choreographer     : word → line → full line (demonstrates all modes)
#        CameraManagerGlobal : word → line
#        AdFit             : stays at word
#      Final state: Choreographer=full, CameraManagerGlobal=line, AdFit=word
#   7. Apply Word Filter — matching lines extracted to a new editor tab
#   8. Add a second group "Network Requests" with keyword: Request
#   9. Disable "Android Activity", enable "Network Requests"
#  10. Apply Word Filter again — new filtered output shows only Request lines
#      (demonstrates switching between independent filter profiles)
#
# Log file: fixtures/workspace/test_log_android.log
#   Keywords and representative lines:
#     "Choreographer"       — lines   4, 10, 134  (frame-skip & animation logs)
#     "CameraManagerGlobal" — lines 5–9, 139–143  (camera state transitions)
#     "AdFit"               — lines  83, 89, 111, 183  (ad SDK events)
#     "Request"             — 9 lines  (HTTP / network request events)
#
# Highlight mode mechanics (inline toggle button cycles word → line → full):
#   hm0 (word)  : button title "Toggle Highlight mode: word"
#   hm1 (line)  : button title "Toggle Highlight mode: line"
#   hm2 (full)  : button title "Toggle Highlight mode: full line"
#
# Sequencing trick — buttons are targeted via .first() in DOM order
# (Choreographer → CameraManagerGlobal → AdFit).  Each click is made when
# the target button label uniquely identifies the intended item:
#   Click A "word"  → Choreographer (first hm0 item)              → hm1
#   Click B "line"  → Choreographer (ONLY hm1 item at that point) → hm2
#   Click C "word"  → CameraManagerGlobal (first remaining hm0)   → hm1
#
# Run:
#   cd scripts/gif-recorder
#   npm install
#   npm run record:base
#
# Output: resources/demo/base.gif
# ============================================================

name: Base Demo
output: base
window:
  width: 1280
  height: 800
frameDelay: 300          # ~3 fps — slow and readable
scale: 0.85
hoverBeforeClick: true   # hover + press frames before every click
loopDelay: 5000          # 5-second pause on last frame before looping

steps:
  # ----------------------------------------------------------
  # SETUP (capture: false) — prepare the UI before recording
  # ----------------------------------------------------------

  - type: aria-click
    role: tab
    name: LogMagnifier
    capture: false

  - type: ensure-expanded
    selector: "role=button[name='Quick Access Section']"
    capture: false

  - type: ensure-collapsed
    selector: "role=button[name='Workflows Section']"
    capture: false

  - type: ensure-collapsed
    selector: "role=button[name='Regex Filters Section']"
    capture: false

  - type: ensure-collapsed
    selector: "role=button[name='ADB Devices Section']"
    capture: false

  - type: ensure-collapsed
    selector: "role=button[name='Runbook Section']"
    capture: false

  - type: ensure-expanded
    selector: "role=button[name='Word Filters Section']"
    capture: false

  - type: delay
    ms: 600

  # ----------------------------------------------------------
  # 1. Open test_log_android.log
  # ----------------------------------------------------------

  - type: screenshot
    caption: "⌨  Cmd + P — Quick Open"
    hold: 1200

  - type: key
    key: "Meta+p"
    capture: false

  - type: delay
    ms: 500

  - type: type
    text: "test_log_android.log"
    caption: "Opening Android logcat file"
    captureEvery: 6

  - type: delay
    ms: 500

  - type: key
    key: "Enter"
    capture: false

  - type: delay
    ms: 1200

  - type: screenshot
    caption: "test_log_android.log — raw Android logcat output"
    hold: 2500

  # ----------------------------------------------------------
  # 2. Show the empty Word Filters panel
  # ----------------------------------------------------------

  - type: screenshot
    caption: "Word Filters — empty, ready to configure"
    hold: 2000

  # ----------------------------------------------------------
  # 3. Create filter group "Android Activity"
  #    The "Add Word Filter Group" button in the section header is only
  #    visible when the mouse is over the Word Filters pane header.
  #    Strategy: hover over the header to reveal action buttons, then
  #    click the "Add Word Filter Group" button.
  # ----------------------------------------------------------

  - type: hover
    selector: "[aria-label='Word Filters Section']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: "[aria-label='Add Word Filter Group']"
    caption: "Hover header → move to Add Word Filter Group button"

  - type: delay
    ms: 200

  - type: click
    selector: "[aria-label='Add Word Filter Group']"
    capture: false

  - type: delay
    ms: 600

  - type: type
    text: "Android Activity"
    caption: "Naming the group"
    captureEvery: 5

  - type: key
    key: "Enter"
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Group 'Android Activity' created — disabled by default"
    hold: 2000

  # ----------------------------------------------------------
  # 4a. Add keyword: Choreographer
  #    Inline "Add Word Filter" buttons are only visible on hover.
  #    Strategy: hover over the group row to reveal them, then click
  #    the button. After hover the mouse stays over the row, so the
  #    subsequent click step can find and click the now-visible button.
  # ----------------------------------------------------------

  - type: hover
    selector: ".monaco-list-row[aria-label*='Android Activity']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: "[aria-label='Add Word Filter']"
    caption: "Hover group row → move to Add Word Filter button"

  - type: delay
    ms: 200

  - type: click
    selector: "[aria-label='Add Word Filter']"
    capture: false

  - type: delay
    ms: 500

  - type: type
    text: "Choreographer"
    caption: "Add keyword: Choreographer"
    captureEvery: 5

  - type: key
    key: "Enter"
    capture: false

  - type: delay
    ms: 600

  # ----------------------------------------------------------
  # 4b. Add keyword: CameraManagerGlobal
  # ----------------------------------------------------------

  - type: hover
    selector: ".monaco-list-row[aria-label*='Android Activity']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: "[aria-label='Add Word Filter']"
    capture: false

  - type: delay
    ms: 200

  - type: click
    selector: "[aria-label='Add Word Filter']"
    capture: false

  - type: delay
    ms: 500

  - type: type
    text: "CameraManagerGlobal"
    caption: "Add keyword: CameraManagerGlobal"
    captureEvery: 5

  - type: key
    key: "Enter"
    capture: false

  - type: delay
    ms: 600

  # ----------------------------------------------------------
  # 4c. Add keyword: AdFit
  # ----------------------------------------------------------

  - type: hover
    selector: ".monaco-list-row[aria-label*='Android Activity']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: "[aria-label='Add Word Filter']"
    capture: false

  - type: delay
    ms: 200

  - type: click
    selector: "[aria-label='Add Word Filter']"
    capture: false

  - type: delay
    ms: 500

  - type: type
    text: "AdFit"
    caption: "Add keyword: AdFit"
    captureEvery: 4

  - type: key
    key: "Enter"
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Three keywords registered — Choreographer, CameraManagerGlobal, AdFit"
    hold: 2500

  # ----------------------------------------------------------
  # 5. Enable the group
  #    Items are enabled by default (isEnabled: true on creation).
  #    The group starts disabled — click its inline Enable button.
  # ----------------------------------------------------------

  - type: hover
    selector: ".monaco-list-row[aria-label*='Android Activity']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: "[aria-label='Enable']"
    caption: "Enable group — highlights activate across the editor"

  - type: delay
    ms: 200

  - type: click
    selector: "[aria-label='Enable']"
    capture: false

  - type: delay
    ms: 1200

  - type: screenshot
    caption: "Group enabled — keywords highlighted in the log"
    hold: 3000

  # ----------------------------------------------------------
  # 6. Demonstrate all three highlight modes
  #
  #  Click A: "Toggle Highlight mode: word"
  #    → Choreographer (first hm0 item in DOM order) moves to hm1 (line)
  #
  #  Click B: "Toggle Highlight mode: line"
  #    → Choreographer is the ONLY hm1 item → moves to hm2 (full)
  #
  #  Click C: "Toggle Highlight mode: word"
  #    → CameraManagerGlobal is now the first hm0 item → moves to hm1 (line)
  #
  #  Final: Choreographer=full line, CameraManagerGlobal=line, AdFit=word
  # ----------------------------------------------------------

  # Click A — Choreographer: word → line
  - type: hover
    selector: ".monaco-list-row[aria-label*='Choreographer']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: "[aria-label='Toggle Highlight mode: word']"
    caption: "Choreographer: word → line highlight mode"

  - type: delay
    ms: 200

  - type: click
    selector: "[aria-label='Toggle Highlight mode: word']"
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Line mode — the whole log line is highlighted"
    hold: 2500

  # Click B — Choreographer: line → full line (only hm1 item, unambiguous)
  - type: hover
    selector: ".monaco-list-row[aria-label*='Choreographer']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: "[aria-label='Toggle Highlight mode: line']"
    caption: "Choreographer: line → full line highlight mode"

  - type: delay
    ms: 200

  - type: click
    selector: "[aria-label='Toggle Highlight mode: line']"
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Full line mode — highlight extends to the entire gutter row"
    hold: 2500

  # Click C — CameraManagerGlobal: word → line (first remaining hm0 item)
  - type: hover
    selector: ".monaco-list-row[aria-label*='CameraManagerGlobal']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: "[aria-label='Toggle Highlight mode: word']"
    caption: "CameraManagerGlobal: word → line highlight mode"

  - type: delay
    ms: 200

  - type: click
    selector: "[aria-label='Toggle Highlight mode: word']"
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Three modes in action: full line / line / word"
    hold: 3000

  # ----------------------------------------------------------
  # 7. Apply Word Filter — extract matching lines to a new tab
  # ----------------------------------------------------------

  - type: aria-click
    role: button
    name: "Apply Word Filter"
    caption: "Apply filter — extract matching lines to a new editor tab"

  - type: delay
    ms: 2000

  # ----------------------------------------------------------
  # Final frame — filtered output
  # ----------------------------------------------------------

  - type: screenshot
    caption: "Filtered output — only matching lines in a new editor tab"
    hold: 3000

  # ----------------------------------------------------------
  # 8. Create a second filter group "Network Requests"
  #    and add keyword: Request
  # ----------------------------------------------------------

  - type: hover
    selector: "[aria-label='Word Filters Section']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: "[aria-label='Add Word Filter Group']"
    caption: "Add a second filter group for a different perspective"

  - type: delay
    ms: 200

  - type: click
    selector: "[aria-label='Add Word Filter Group']"
    capture: false

  - type: delay
    ms: 600

  - type: type
    text: "Network Requests"
    caption: "Naming the new group"
    captureEvery: 5

  - type: key
    key: "Enter"
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Second group 'Network Requests' created"
    hold: 1500

  - type: hover
    selector: ".monaco-list-row[aria-label*='Network Requests']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: ".monaco-list-row[aria-label*='Network Requests'] [aria-label='Add Word Filter']"
    caption: "Add keyword to the new group"

  - type: delay
    ms: 200

  - type: click
    selector: ".monaco-list-row[aria-label*='Network Requests'] [aria-label='Add Word Filter']"
    capture: false

  - type: delay
    ms: 500

  - type: type
    text: "Request"
    caption: "Add keyword: Request"
    captureEvery: 4

  - type: key
    key: "Enter"
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "Keyword 'Request' added to Network Requests group"
    hold: 2000

  # ----------------------------------------------------------
  # 9. Disable "Android Activity", enable "Network Requests"
  #    — switch active filter profile
  # ----------------------------------------------------------

  - type: hover
    selector: ".monaco-list-row[aria-label*='Android Activity']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: ".monaco-list-row[aria-label*='Android Activity'] [aria-label='Disable']"
    caption: "Disable 'Android Activity' group"

  - type: delay
    ms: 200

  - type: click
    selector: ".monaco-list-row[aria-label*='Android Activity'] [aria-label='Disable']"
    capture: false

  - type: delay
    ms: 800

  - type: screenshot
    caption: "'Android Activity' disabled — highlights cleared"
    hold: 2000

  - type: hover
    selector: ".monaco-list-row[aria-label*='Network Requests']"
    capture: false

  - type: delay
    ms: 300

  - type: hover
    selector: ".monaco-list-row[aria-label*='Network Requests'] [aria-label='Enable']"
    caption: "Enable 'Network Requests' — new highlights appear"

  - type: delay
    ms: 200

  - type: click
    selector: ".monaco-list-row[aria-label*='Network Requests'] [aria-label='Enable']"
    capture: false

  - type: delay
    ms: 1200

  - type: screenshot
    caption: "'Network Requests' active — Request lines highlighted"
    hold: 3000

  # ----------------------------------------------------------
  # 10. Apply Word Filter with the new active group
  # ----------------------------------------------------------

  - type: aria-click
    role: button
    name: "Apply Word Filter"
    caption: "Apply filter — extract Request lines to a new tab"

  - type: delay
    ms: 2000

  # ----------------------------------------------------------
  # Final frame — second filtered output
  # ----------------------------------------------------------

  - type: screenshot
    caption: "Filters applied in stages — each group narrows the output further"
    hold: 5000
